server {
    listen       80;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve files if they exist, otherwise fall back to index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: customize error page fallback to index
    error_page 404 /index.html;
}
